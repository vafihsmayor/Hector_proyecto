# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - frontend-hector

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: project/package-lock.json

      - name: npm install and build
        run: |
          cd project
          # Aumentar memoria para el build si es necesario
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm install
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://backend-hector-h0hnbnfmgyadgxhu.canadacentral-01.azurewebsites.net

      - name: Prepare standalone artifact
        run: |
          mkdir release
          
          # 1. Copiar el contenido de standalone
          # standalone ya contiene server.js, node_modules y la carpeta del proyecto
          if [ -d "project/.next/standalone" ]; then
            cp -rv project/.next/standalone/. release/
          else
            echo "Error: standalone directory not found. Make sure output: 'standalone' is in next.config.js"
            exit 1
          fi
          
          # 2. Copiar archivos estáticos y públicos
          # server.js los busca dentro de 'project/.next/static' y 'project/public'
          mkdir -p release/project/.next/static
          cp -rv project/.next/static/. release/project/.next/static/
          
          mkdir -p release/project/public
          cp -rv project/public/. release/project/public/
          
          # 3. También por seguridad en la raíz (compatibilidad)
          mkdir -p release/.next/static
          cp -rv project/.next/static/. release/.next/static/
          mkdir -p release/public
          cp -rv project/public/. release/public/

          echo "Final check of release folder structure:"
          ls -R release/
          
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2B9E5F8AB1C647BFA1FDFD6896620141 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4FB1536569D84DDBA908DF8D5EE9F49A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E86E5DE31DFD4D919FCA4D65E01DAC0B }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'frontend-hector'
          slot-name: 'Production'
          package: ./release
          startup-command: 'node server.js'
          app-settings-json: |
            [
                {
                    "name": "SCM_DO_BUILD_DURING_DEPLOYMENT",
                    "value": "false",
                    "slotSetting": false
                },
                {
                    "name": "NODE_ENV",
                    "value": "production",
                    "slotSetting": false
                },
                {
                    "name": "HOSTNAME",
                    "value": "0.0.0.0",
                    "slotSetting": false
                },
                {
                    "name": "PORT",
                    "value": "8080",
                    "slotSetting": false
                }
            ]