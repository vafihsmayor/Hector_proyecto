# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - biometricofrontendhenry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: project/package-lock.json

      - name: npm install, build, and test
        run: |
          cd project
          # Aumentar memoria para el build si es necesario
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm install
          npm run build --if-present
          npm run test --if-present
        env:
          NEXT_PUBLIC_API_URL: https://backend-hector-h0hnbnfmgyadgxhu.canadacentral-01.azurewebsites.net

      - name: Prepare standalone artifact
        run: |
          mkdir release
          
          # Copiar el contenido de standalone (generado por output: 'standalone')
          if [ -d "project/.next/standalone" ]; then
            cp -rv project/.next/standalone/. release/
          else
            echo "Error: standalone directory not found. Ensure output: 'standalone' is in next.config.js"
            exit 1
          fi
          
          # Copiar archivos estáticos y públicos
          mkdir -p release/project/.next/static
          cp -rv project/.next/static/. release/project/.next/static/
          
          mkdir -p release/project/public
          cp -rv project/public/. release/project/public/
          
          echo "Final check of release folder structure:"
          ls -R release/
          
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./release
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C60E5CEF7E6144A99AF952A2F00DEC5A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DDC499CD67924433B89CBE646B39DB3B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3F0FF1C7B23444DDA200AF281E0E9F72 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'biometricofrontendhenry'
          slot-name: 'Production'
          package: ./release
          startup-command: 'node server.js'
          app-settings-json: |
            [
                {
                    "name": "SCM_DO_BUILD_DURING_DEPLOYMENT",
                    "value": "false",
                    "slotSetting": false
                },
                {
                    "name": "NODE_ENV",
                    "value": "production",
                    "slotSetting": false
                },
                {
                    "name": "PORT",
                    "value": "8080",
                    "slotSetting": false
                }
            ]