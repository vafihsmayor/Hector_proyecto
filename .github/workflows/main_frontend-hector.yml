# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - frontend-hector

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: project/package-lock.json

      - name: npm install and build
        run: |
          npm install
          npm run build
        working-directory: project
        env:
          NEXT_PUBLIC_API_URL: https://backend-hector-h0hnbnfmgyadgxhu.canadacentral-01.azurewebsites.net

      - name: Prepare standalone artifact
        run: |
          mkdir release
          
          # 1. Copiar el contenido de standalone
          # standalone ya contiene server.js, node_modules y la carpeta del proyecto
          cp -rv project/.next/standalone/. release/
          
          # 2. Copiar archivos estáticos y públicos (Next.js standalone los requiere fuera)
          # Los ponemos en la subcarpeta 'project' que es donde server.js los busca si se construyó en esa carpeta
          mkdir -p release/project/.next/static
          cp -rv project/.next/static/. release/project/.next/static/
          
          mkdir -p release/project/public
          cp -rv project/public/. release/project/public/
          
          # 3. También por seguridad en la raíz (por si se ejecuta con cwd diferente)
          mkdir -p release/.next/static
          cp -rv project/.next/static/. release/.next/static/
          mkdir -p release/public
          cp -rv project/public/. release/public/

          echo "Final check of release folder structure:"
          ls -F release/
          
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A9C7C7FAD6FC4A20BC63094C82C4C388 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_77972A39F70A4664ABF57326115ABB9F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_79C760631BCF49D6B8317CBA758374ED }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'frontend-hector'
          slot-name: 'Production'
          package: ./release
          startup-command: 'node server.js'
          app-settings-json: |
            [
                {
                    "name": "SCM_DO_BUILD_DURING_DEPLOYMENT",
                    "value": "false",
                    "slotSetting": false
                },
                {
                    "name": "NODE_ENV",
                    "value": "production",
                    "slotSetting": false
                },
                {
                    "name": "HOSTNAME",
                    "value": "0.0.0.0",
                    "slotSetting": false
                }
            ]